# Netlify configuration for Etude1

[build]
  # No build process needed - static HTML files
  publish = "."

[[redirects]]
  # Redirect root to landing page
  from = "/"
  to = "/ETUDE1_LANDING_PAGE.html"
  status = 200

[[headers]]
  # Apply security headers to all pages
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "no-referrer-when-downgrade"

[[headers]]
  # Cache static assets for 1 year
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  # Allow Web Audio API and fullscreen features
  for = "/*.html"
  [headers.values]
    Permissions-Policy = "autoplay=*, fullscreen=*, accelerometer=*, gyroscope=*"
